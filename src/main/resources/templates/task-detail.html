<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Task Detail - RagDocSupport')}"></head>
<body class="bg-surface-950 min-h-screen text-surface-200">
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="max-w-6xl mx-auto px-6 py-8">

    <div class="flex items-center gap-3 mb-6 animate-fade-in">
        <a href="/web/tasks" class="text-surface-200/40 hover:text-surface-200 transition-colors text-sm">&larr; Tasks</a>
        <span class="text-surface-200/20">/</span>
        <h1 class="text-lg font-bold text-white font-mono" th:text="${task.id}"></h1>
    </div>

    <!-- Task Info Card -->
    <div class="bg-surface-900 border border-surface-800/60 rounded-xl p-6 mb-6 animate-slide-up">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-sm">
            <div>
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Library</span>
                <span class="font-mono font-medium text-white" th:text="${task.library}"></span>
            </div>
            <div>
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Version</span>
                <span class="font-mono text-white/80" th:text="${task.version}"></span>
            </div>
            <div>
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Status</span>
                <span th:if="${task.status.name() == 'RUNNING'}" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-mono bg-run/10 text-run border border-run/20">
                    <span class="w-1.5 h-1.5 rounded-full bg-run animate-pulse"></span>running
                </span>
                <span th:if="${task.status.name() == 'COMPLETED'}" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-mono bg-ok/10 text-ok border border-ok/20">done</span>
                <span th:if="${task.status.name() == 'FAILED'}" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-mono bg-fail/10 text-fail border border-fail/20">failed</span>
            </div>
            <div>
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Chunks</span>
                <span class="font-mono text-white/80" th:text="${task.chunksIndexed}"></span>
            </div>
            <div>
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Started</span>
                <span class="text-xs font-mono text-surface-200/60" th:text="${#temporals.format(task.startedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            <div th:if="${task.completedAt != null}">
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Completed</span>
                <span class="text-xs font-mono text-surface-200/60" th:text="${#temporals.format(task.completedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            <div th:if="${task.docUrl != null}">
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Doc URL</span>
                <span class="text-xs font-mono text-accent/60 break-all" th:text="${task.docUrl}"></span>
            </div>
            <div th:if="${task.errorMessage != null}">
                <span class="text-xs text-surface-200/40 uppercase tracking-wider block mb-1">Error</span>
                <span class="text-xs font-mono text-fail/80" th:text="${task.errorMessage}"></span>
            </div>
        </div>
    </div>

    <!-- Logs -->
    <div class="bg-surface-900 border border-surface-800/60 rounded-xl overflow-hidden animate-slide-up" style="animation-delay: 0.05s">
        <div class="px-4 py-2.5 bg-surface-800/50 flex items-center gap-2.5 border-b border-surface-800/60">
            <div class="flex gap-1.5">
                <span class="w-3 h-3 rounded-full bg-fail/60"></span>
                <span class="w-3 h-3 rounded-full bg-warn/60"></span>
                <span class="w-3 h-3 rounded-full bg-ok/60"></span>
            </div>
            <span class="text-surface-200/40 text-xs font-mono">logs</span>
        </div>
        <div id="log-container" class="log-container p-4 max-h-[600px] overflow-y-auto bg-surface-950/80">
            <div th:each="logEntry : ${logs}" class="flex gap-2">
                <span class="text-surface-200/30 shrink-0" th:text="${#temporals.format(logEntry.timestamp, 'HH:mm:ss')}"></span>
                <span th:class="${
                    logEntry.type.name() == 'CRAWL' ? 'text-run shrink-0' :
                    logEntry.type.name() == 'CHUNK' ? 'text-purple-400 shrink-0' :
                    logEntry.type.name() == 'EMBED' ? 'text-accent shrink-0' :
                    logEntry.type.name() == 'UPSERT' ? 'text-ok shrink-0' :
                    logEntry.type.name() == 'WARN' ? 'text-warn shrink-0' :
                    logEntry.type.name() == 'ERROR' ? 'text-fail shrink-0' :
                    logEntry.type.name() == 'COMPLETE' ? 'text-ok shrink-0' :
                    'text-surface-200/50 shrink-0'
                }" th:text="'[' + ${logEntry.type} + ']'"></span>
                <span class="text-surface-200/70" th:text="${logEntry.message}"></span>
            </div>
            <div th:if="${logs.isEmpty()}" class="text-surface-200/30 text-center py-8">No logs recorded.</div>
        </div>
    </div>

    <!-- Polling for running tasks -->
    <div th:if="${task.status.name() == 'RUNNING'}"
         hx-get="@{/web/tasks/{id}/logs(id=${task.id})}"
         th:hx-get="@{/web/tasks/{id}/logs(id=${task.id}, afterSequence=${#lists.size(logs) > 0 ? logs[#lists.size(logs)-1].sequence : -1})}"
         hx-trigger="every 3s"
         hx-target="#new-logs"
         hx-swap="innerHTML">
    </div>
    <div id="new-logs"></div>
</div>
</body>
</html>
