<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Task Detail - RagDocSupport')}"></head>
<body class="bg-gray-50 min-h-screen">
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex items-center gap-3 mb-6">
        <a href="/web/tasks" class="text-gray-500 hover:text-gray-700">&larr; Tasks</a>
        <h1 class="text-2xl font-bold">
            Task <span class="font-mono" th:text="${task.id}"></span>
        </h1>
    </div>

    <!-- Task Info Card -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div>
                <span class="text-gray-500 block">Library</span>
                <span class="font-medium" th:text="${task.library}"></span>
            </div>
            <div>
                <span class="text-gray-500 block">Version</span>
                <span class="font-medium" th:text="${task.version}"></span>
            </div>
            <div>
                <span class="text-gray-500 block">Status</span>
                <span th:if="${task.status.name() == 'RUNNING'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">RUNNING</span>
                <span th:if="${task.status.name() == 'COMPLETED'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">COMPLETED</span>
                <span th:if="${task.status.name() == 'FAILED'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">FAILED</span>
            </div>
            <div>
                <span class="text-gray-500 block">Chunks Indexed</span>
                <span class="font-medium" th:text="${task.chunksIndexed}"></span>
            </div>
            <div>
                <span class="text-gray-500 block">Started</span>
                <span th:text="${#temporals.format(task.startedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            <div th:if="${task.completedAt != null}">
                <span class="text-gray-500 block">Completed</span>
                <span th:text="${#temporals.format(task.completedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            <div th:if="${task.docUrl != null}">
                <span class="text-gray-500 block">Doc URL</span>
                <span class="text-xs break-all" th:text="${task.docUrl}"></span>
            </div>
            <div th:if="${task.errorMessage != null}">
                <span class="text-gray-500 block">Error</span>
                <span class="text-red-600 text-xs" th:text="${task.errorMessage}"></span>
            </div>
        </div>
    </div>

    <!-- Logs -->
    <div class="bg-gray-900 rounded-lg shadow overflow-hidden">
        <div class="px-4 py-2 bg-gray-800">
            <span class="text-gray-400 text-xs font-mono">Logs</span>
        </div>
        <div id="log-container" class="log-container p-4 max-h-[600px] overflow-y-auto">
            <div th:each="logEntry : ${logs}" class="flex gap-2">
                <span class="text-gray-500" th:text="${#temporals.format(logEntry.timestamp, 'HH:mm:ss')}"></span>
                <span th:class="${
                    logEntry.type.name() == 'CRAWL' ? 'text-blue-400' :
                    logEntry.type.name() == 'CHUNK' ? 'text-purple-400' :
                    logEntry.type.name() == 'EMBED' ? 'text-cyan-400' :
                    logEntry.type.name() == 'UPSERT' ? 'text-green-400' :
                    logEntry.type.name() == 'WARN' ? 'text-yellow-400' :
                    logEntry.type.name() == 'ERROR' ? 'text-red-400' :
                    logEntry.type.name() == 'COMPLETE' ? 'text-green-400' :
                    'text-gray-300'
                }" th:text="'[' + ${logEntry.type} + ']'"></span>
                <span class="text-gray-200" th:text="${logEntry.message}"></span>
            </div>
        </div>
    </div>

    <!-- Polling for running tasks -->
    <div th:if="${task.status.name() == 'RUNNING'}"
         hx-get="@{/web/tasks/{id}/logs(id=${task.id})}"
         th:hx-get="@{/web/tasks/{id}/logs(id=${task.id}, afterSequence=${#lists.size(logs) > 0 ? logs[#lists.size(logs)-1].sequence : -1})}"
         hx-trigger="every 3s"
         hx-target="#new-logs"
         hx-swap="innerHTML">
    </div>
    <div id="new-logs"></div>
</div>
</body>
</html>
