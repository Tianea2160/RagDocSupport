<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard - RagDocSupport')}"></head>
<body class="bg-gray-50 min-h-screen">
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="max-w-5xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-6">Dashboard</h1>

    <!-- Running Tasks Banner -->
    <div th:if="${!runningTasks.isEmpty()}" class="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
        <h3 class="text-sm font-semibold text-blue-800 mb-2">Running Tasks</h3>
        <div th:each="task : ${runningTasks}" class="flex items-center gap-3 text-sm">
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">RUNNING</span>
            <span th:text="${task.library + ':' + task.version}"></span>
            <a th:href="@{/web/tasks/{id}(id=${task.id})}" class="text-blue-600 hover:underline text-xs">View</a>
        </div>
    </div>

    <!-- Indexed Libraries -->
    <div class="bg-white rounded-lg shadow mb-6">
        <div class="px-4 py-3 border-b">
            <h2 class="font-semibold">Indexed Libraries</h2>
        </div>
        <div th:if="${libraries.isEmpty()}" class="px-4 py-8 text-center text-gray-500">
            No libraries indexed yet. <a href="/web/register" class="text-blue-600 hover:underline">Register one</a>.
        </div>
        <table th:if="${!libraries.isEmpty()}" class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">Library</th>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">Version</th>
                    <th class="px-4 py-2 text-right font-medium text-gray-600">Chunks</th>
                    <th class="px-4 py-2 text-center font-medium text-gray-600">Latest</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="lib : ${libraries}" class="border-t hover:bg-gray-50">
                    <td class="px-4 py-2 font-medium" th:text="${lib.library}"></td>
                    <td class="px-4 py-2" th:text="${lib.version}"></td>
                    <td class="px-4 py-2 text-right" th:text="${lib.chunkCount}"></td>
                    <td class="px-4 py-2 text-center">
                        <span th:if="${lib.latest}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">latest</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Recent Tasks -->
    <div th:if="${!recentTasks.isEmpty()}" class="bg-white rounded-lg shadow">
        <div class="px-4 py-3 border-b flex justify-between items-center">
            <h2 class="font-semibold">Recent Tasks</h2>
            <a href="/web/tasks" class="text-sm text-blue-600 hover:underline">View all</a>
        </div>
        <table class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">ID</th>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">Library</th>
                    <th class="px-4 py-2 text-center font-medium text-gray-600">Status</th>
                    <th class="px-4 py-2 text-right font-medium text-gray-600">Chunks</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="task : ${recentTasks}" class="border-t hover:bg-gray-50">
                    <td class="px-4 py-2">
                        <a th:href="@{/web/tasks/{id}(id=${task.id})}" class="text-blue-600 hover:underline" th:text="${task.id}"></a>
                    </td>
                    <td class="px-4 py-2" th:text="${task.library + ':' + task.version}"></td>
                    <td class="px-4 py-2 text-center">
                        <span th:if="${task.status.name() == 'RUNNING'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">RUNNING</span>
                        <span th:if="${task.status.name() == 'COMPLETED'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">COMPLETED</span>
                        <span th:if="${task.status.name() == 'FAILED'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">FAILED</span>
                    </td>
                    <td class="px-4 py-2 text-right" th:text="${task.chunksIndexed}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
