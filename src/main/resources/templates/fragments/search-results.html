<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="results">
    <div th:if="${results.isEmpty()}" class="text-center py-12">
        <p class="text-surface-200/40 text-sm">No results found.</p>
    </div>
    <div th:each="result,iter : ${results}" class="bg-surface-900 border border-surface-800/60 rounded-xl p-5 mb-3 animate-slide-up" th:style="'animation-delay:' + ${iter.index * 0.04} + 's'">
        <div class="flex items-center gap-2.5 mb-3">
            <span class="font-mono font-medium text-sm text-white" th:text="${result.metadata.library + ':' + result.metadata.version}"></span>
            <span class="px-2 py-0.5 rounded-full text-xs font-mono bg-accent/10 text-accent/70 border border-accent/15" th:text="${result.metadata.docType}"></span>
        </div>
        <div th:if="${result.metadata.sectionPath != null and !result.metadata.sectionPath.isEmpty()}"
             class="text-xs text-surface-200/40 font-mono mb-2" th:text="${result.metadata.sectionPath}"></div>
        <div class="text-sm text-surface-200/80 whitespace-pre-wrap break-words border-l-2 border-accent/20 pl-4 leading-relaxed"
             th:text="${result.text.length() > 500 ? result.text.substring(0, 500) + '...' : result.text}"></div>
        <div class="mt-3">
            <a th:href="${result.metadata.sourceUrl}" target="_blank"
               class="text-xs text-accent/50 hover:text-accent font-mono transition-colors" th:text="${result.metadata.sourceUrl}"></a>
        </div>
    </div>
</div>
</html>
