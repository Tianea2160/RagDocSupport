<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">RagDocSupport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/webjars/htmx.org/2.0.8/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'Menlo', 'Monaco', 'monospace'],
                        sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e2028', 900: '#14151a', 950: '#0c0d10' },
                        accent: { DEFAULT: '#22d3ee', dim: '#0e7490', bright: '#67e8f9' },
                        ok: '#4ade80',
                        warn: '#fbbf24',
                        fail: '#f87171',
                        run: '#60a5fa',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
        .log-container { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.7; }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: #1e2028; }
        .log-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .log-container::-webkit-scrollbar-thumb:hover { background: #475569; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-flex; }
        .htmx-request .htmx-hide-on-request { opacity: 0.5; pointer-events: none; }
        @keyframes terminal-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor-blink::after { content: '\2588'; animation: terminal-blink 1s step-end infinite; color: #22d3ee; margin-left: 2px; }
    </style>
</head>

<nav th:fragment="nav">
    <div class="bg-surface-950 border-b border-surface-800/60">
        <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
            <a href="/web" class="flex items-center gap-2.5 group">
                <span class="w-2.5 h-2.5 rounded-full bg-accent shadow-[0_0_8px_rgba(34,211,238,0.4)] group-hover:shadow-[0_0_12px_rgba(34,211,238,0.6)] transition-shadow"></span>
                <span class="font-mono font-semibold text-white tracking-tight">RagDocSupport</span>
            </a>
            <div class="flex items-center gap-1">
                <a href="/web" class="px-3 py-1.5 text-sm text-surface-200/70 hover:text-white hover:bg-surface-800/50 rounded-md transition-colors font-medium">Dashboard</a>
                <a href="/web/register" class="px-3 py-1.5 text-sm text-surface-200/70 hover:text-white hover:bg-surface-800/50 rounded-md transition-colors font-medium">Register</a>
                <a href="/web/search" class="px-3 py-1.5 text-sm text-surface-200/70 hover:text-white hover:bg-surface-800/50 rounded-md transition-colors font-medium">Search</a>
                <a href="/web/tasks" class="px-3 py-1.5 text-sm text-surface-200/70 hover:text-white hover:bg-surface-800/50 rounded-md transition-colors font-medium">Tasks</a>
            </div>
        </div>
    </div>
</nav>

</html>
