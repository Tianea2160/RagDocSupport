<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tasks - RagDocSupport')}"></head>
<body class="bg-gray-50 min-h-screen">
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="max-w-5xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-6">Task History</h1>

    <div class="bg-white rounded-lg shadow">
        <div th:if="${tasks.isEmpty()}" class="px-4 py-8 text-center text-gray-500">
            No tasks yet. <a href="/web/register" class="text-blue-600 hover:underline">Register documentation</a> to create a task.
        </div>
        <table th:if="${!tasks.isEmpty()}" class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">ID</th>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">Library</th>
                    <th class="px-4 py-2 text-center font-medium text-gray-600">Status</th>
                    <th class="px-4 py-2 text-right font-medium text-gray-600">Chunks</th>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">Started</th>
                    <th class="px-4 py-2 text-left font-medium text-gray-600">Error</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="task : ${tasks}" class="border-t hover:bg-gray-50">
                    <td class="px-4 py-2">
                        <a th:href="@{/web/tasks/{id}(id=${task.id})}" class="text-blue-600 hover:underline font-mono text-xs" th:text="${task.id}"></a>
                    </td>
                    <td class="px-4 py-2 font-medium" th:text="${task.library + ':' + task.version}"></td>
                    <td class="px-4 py-2 text-center">
                        <span th:if="${task.status.name() == 'RUNNING'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">RUNNING</span>
                        <span th:if="${task.status.name() == 'COMPLETED'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">COMPLETED</span>
                        <span th:if="${task.status.name() == 'FAILED'}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">FAILED</span>
                    </td>
                    <td class="px-4 py-2 text-right" th:text="${task.chunksIndexed}"></td>
                    <td class="px-4 py-2 text-gray-500 text-xs" th:text="${#temporals.format(task.startedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                    <td class="px-4 py-2 text-red-600 text-xs truncate max-w-xs" th:text="${task.errorMessage}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
