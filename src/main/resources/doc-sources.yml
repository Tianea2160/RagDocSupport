sources:
  spring-boot:
    group: "org.springframework.boot"
    docs:
      reference:
        urls:
          - "https://docs.spring.io/spring-boot/{version}/reference/"
          - "https://docs.spring.io/spring-boot/docs/{version}/reference/htmlsingle/"
          - "https://docs.spring.io/spring-boot/docs/{version}/reference/html/"
        recursive: true
        max-depth: 2
      migration:
        url: "https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-{major}.0-Release-Notes"
      changelog:
        url: "https://github.com/spring-projects/spring-boot/releases/tag/v{version}"

  spring-framework:
    group: "org.springframework"
    artifact: "spring-core"
    docs:
      reference:
        urls:
          - "https://docs.spring.io/spring-framework/reference/{version}/"
          - "https://docs.spring.io/spring-framework/docs/{version}/reference/html/"
        recursive: true
        max-depth: 2

  kafka:
    group: "org.apache.kafka"
    docs:
      reference:
        url: "https://kafka.apache.org/{majorMinor}/documentation/"

  kotlinx-coroutines:
    group: "org.jetbrains.kotlinx"
    artifact: "kotlinx-coroutines-core"
    docs:
      guide:
        url: "https://kotlinlang.org/docs/coroutines-guide.html"
      changelog:
        url: "https://github.com/Kotlin/kotlinx.coroutines/blob/master/CHANGES.md"

  spring-ai:
    group: "org.springframework.ai"
    docs:
      reference:
        url: "https://docs.spring.io/spring-ai/reference/"
        recursive: true
        max-depth: 2

  spring-security:
    group: "org.springframework.security"
    artifact: "spring-security-core"
    docs:
      reference:
        urls:
          - "https://docs.spring.io/spring-security/reference/{version}/"
          - "https://docs.spring.io/spring-security/reference/"
        recursive: true
        max-depth: 2

  spring-data-redis:
    group: "org.springframework.data"
    artifact: "spring-data-redis"
    docs:
      reference:
        urls:
          - "https://docs.spring.io/spring-data/redis/reference/{version}/"
          - "https://docs.spring.io/spring-data/redis/reference/"
        recursive: true
        max-depth: 2

  jooq:
    group: "org.jooq"
    artifact: "jooq"
    docs:
      reference:
        url: "https://www.jooq.org/doc/latest/manual/"
        recursive: true
        max-depth: 2

  liquibase:
    group: "org.liquibase"
    artifact: "liquibase-core
    docs:
      reference:
        url: "https://docs.liquibase.com/change-types/home.html"

  springdoc-openapi:
    group: "org.springdoc"
    artifact: "springdoc-openapi-starter-common"
    docs:
      reference:
        url: "https://springdoc.org/"

  testcontainers:
    group: "org.testcontainers"
    artifact: "testcontainers"
    docs:
      reference:
        url: "https://java.testcontainers.org/modules/databases/postgres/"

  postgresql:
    group: "org.postgresql"
    artifact: "postgresql"
    docs:
      reference:
        url: "https://jdbc.postgresql.org/documentation/"
        recursive: true
        max-depth: 2
